<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fasteval experiment view</title>
  <!-- __FASTEVAL_STYLES__ -->
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://github.com/CorrectRoadH/fasteval" target="_blank" rel="noopener"><span class="mark"></span><span>fasteval</span></a>
    <nav class="nav" aria-label="Report">
      <button class="nav-tab is-active" data-tab="experiments">Experiments</button>
      <button class="nav-tab" data-tab="runs">Runs</button>
      <button class="nav-tab" data-tab="traces">Traces</button>
    </nav>
  </header>
  <main>
    <section class="hero">
      <h1>Eval Run Results</h1>
      <div class="meta">
        <span><b>Last run:</b> __FASTEVAL_LAST_RUN__</span>
      </div>
    </section>

    <section class="summary" aria-label="Run summary">
      <div class="metric"><div class="label">Pass Rate</div><div class="value">__FASTEVAL_PASS_RATE__</div></div>
      <div class="metric"><div class="label">Eval Results</div><div class="value">__FASTEVAL_RESULT_COUNT__</div></div>
      <div class="metric"><div class="label">Duration</div><div class="value">__FASTEVAL_DURATION__</div></div>
      <div class="metric"><div class="label">Estimated Cost</div><div class="value">__FASTEVAL_COST__</div></div>
    </section>

    <section id="tab-experiments">
      <div class="section-head">
        <h2>Experiments</h2>
      </div>
      <div id="group-selector" class="group-selector"></div>
      <div class="section-sub-head">
        <span id="group-detail-label" class="group-detail-label"></span>
        <div class="controls">
          <input id="search" class="search" type="search" placeholder="Filter experiment, agent, model, or eval..." autocomplete="off">
        </div>
      </div>
      <!-- __FASTEVAL_RESULTS_BODY__ -->
    </section>

    <section id="tab-runs" hidden>
      <div class="section-head">
        <h2>Individual Runs</h2>
        <div class="controls">
          <input id="runs-search" class="search" type="search" placeholder="Filter eval ID or experiment..." autocomplete="off">
        </div>
      </div>
      <div id="runs-container"></div>
    </section>

    <section id="tab-traces" hidden>
      <div class="section-head">
        <h2>Traces</h2>
      </div>
      <div id="traces-container"></div>
    </section>
  </main>
  <script>
    const rows = __FASTEVAL_ROWS_JSON__;
    const state = {
      sort: "passRate", dir: -1, query: "", open: new Set(),
      selectedGroup: [...new Set(rows.map(r => r.group).filter(Boolean))].sort()[0] ?? null,
    };
    const tbody = document.querySelector("#results-body");
    const search = document.querySelector("#search");

    function buildGroupMap() {
      const m = new Map();
      for (const row of rows) {
        if (row.group) {
          if (!m.has(row.group)) m.set(row.group, []);
          m.get(row.group).push(row);
        }
      }
      return m;
    }

    function render() {
      if (!tbody) return;
      const q = state.query.trim().toLowerCase();
      const groupMap = buildGroupMap();

      // Group selector cards
      const selectorEl = document.getElementById("group-selector");
      if (selectorEl) selectorEl.innerHTML = renderGroupSelector(groupMap);

      // Detail label
      const labelEl = document.getElementById("group-detail-label");
      if (labelEl) labelEl.textContent = state.selectedGroup ?? "";

      // Rows for detail table
      const pool = state.selectedGroup ? (groupMap.get(state.selectedGroup) ?? []) : rows;
      const filtered = pool.filter((row) => {
        if (!q) return true;
        return [row.label, row.group || "", row.experimentId || "", row.agent, row.model || "", ...row.results.map((r) => r.id)]
          .join(" ")
          .toLowerCase()
          .includes(q);
      });
      filtered.sort((a, b) => compareRows(a, b, state.sort) * state.dir);
      tbody.innerHTML = filtered.map((row) => renderRow(row)).join("");
    }

    function renderGroupSelector(groupMap) {
      return [...groupMap.keys()].sort().map(group => {
        const groupRows = groupMap.get(group);
        const allResults = groupRows.flatMap(r => r.results);
        const passed = allResults.filter(r => r.verdict === "passed").length;
        const failed = allResults.filter(r => r.verdict === "failed").length;
        const passRate = allResults.length ? passed / allResults.length : 0;
        const tone = passRate >= 0.8 ? "good" : passRate >= 0.5 ? "warn" : "bad";
        const totalCost = groupRows.reduce((s, r) => s + (r.estimatedCostUSD || 0), 0);
        const lastRun = groupRows.map(r => r.lastRunAt).filter(Boolean).sort().at(-1);
        const sel = state.selectedGroup === group;
        return `<div class="group-card${sel ? " is-selected" : ""}" data-group="${escapeAttr(group)}" tabindex="0" role="button">
          <div class="group-card-name">${escapeHtml(group)}</div>
          <div class="group-card-rate ${tone}">${formatPercent(passRate)}</div>
          <div class="group-card-meta">${groupRows.length} experiment${groupRows.length === 1 ? "" : "s"} · ${formatCost(totalCost)}</div>
          ${lastRun ? `<div class="group-card-time">${escapeHtml(formatDateTime(lastRun))}</div>` : ""}
        </div>`;
      }).join("");
    }

    function compareRows(a, b, key) {
      const av = valueFor(a, key);
      const bv = valueFor(b, key);
      if (typeof av === "string" || typeof bv === "string") return String(av).localeCompare(String(bv));
      return Number(av) - Number(bv);
    }

    function valueFor(row, key) {
      if (key === "experiment") return row.label;
      if (key === "model") return row.model || "";
      if (key === "agent") return row.agent;
      if (key === "cost") return row.estimatedCostUSD || 0;
      return row[key] || 0;
    }

    function renderRow(row) {
      const open = state.open.has(row.key);
      const tone = row.passRate >= 0.8 ? "good" : row.passRate >= 0.5 ? "warn" : "bad";
      return `
        <tr class="main-row ${open ? "is-open" : ""}" data-key="${escapeAttr(row.key)}" tabindex="0">
          <td><span class="chev"></span><span class="name">${escapeHtml(row.label)}</span><div class="sub">${row.runs} eval result${row.runs === 1 ? "" : "s"}${row.lastRunAt ? " · " + escapeHtml(formatDateTime(row.lastRunAt)) : ""}</div></td>
          <td>${escapeHtml(row.model || "default")}</td>
          <td>${escapeHtml(row.agent)}</td>
          <td class="num">${formatDuration(row.avgDurationMs)}</td>
          <td class="num ${tone}">${formatPercent(row.passRate)}</td>
          <td class="num">${formatTokens(totalTokens(row.usage))}</td>
          <td class="num">${formatCost(row.estimatedCostUSD)}</td>
          <td><span class="pill">${row.passed} passed / ${row.failed} failed</span></td>
        </tr>
        ${open ? renderDetail(row) : ""}
      `;
    }

    function renderDetail(row) {
      const totalDuration = row.results.reduce((sum, r) => sum + (r.durationMs || 0), 0);
      const sampleResult = row.results.find((r) => r.verdict === "failed") || row.results[0] || {};
      const details = row.results
        .slice()
        .sort((a, b) => a.id.localeCompare(b.id) || a.attempt - b.attempt)
        .map((r) => {
          const bad = (r.assertions || []).filter((a) => !a.passed).map((a) => a.name).join(", ");
          const statusClass = r.verdict === "passed" ? "good" : r.verdict === "failed" ? "bad" : "warn";
          const reason = r.error || bad;
          const item = `<div class="eval-item"><span class="${statusClass}">${r.verdict}</span><span class="eval-id">${escapeHtml(r.id)}</span><span class="assertions"${reason ? ` title="${escapeAttr(reason)}"` : ""}>${reason ? escapeHtml(reason) : '<span class="reason-empty">all assertions passed</span>'}</span><span class="num">${formatDuration(r.durationMs)}${r.startedAt ? `<small class="ran-at">${escapeHtml(formatClock(r.startedAt))}</small>` : ""}</span><span class="num">${formatTokens(totalTokens(r.usage))}</span><span class="num">${formatCost(r.estimatedCostUSD)}</span><span class="num" title="attempt ${r.attempt + 1} of ${row.runs}">#${r.attempt + 1}</span></div>`;
          // 按需懒加载:展开时才 fetch 该 eval 的工件(见下方 toggle 处理)。
          // transcript 是主视图(events.json,读「agent 做了什么」);timing trace 退为次要(trace.json,瀑布图)。
          const transcript = (r.hasEvents && r.artifactBase)
            ? `<details class="trace-details transcript-lazy" data-src="${escapeAttr(r.artifactBase + "/events.json")}"><summary>transcript</summary><div class="trace-slot"><div class="trace-span-meta">loading…</div></div></details>`
            : "";
          const trace = (r.hasTrace && r.artifactBase)
            ? `<details class="trace-details trace-lazy" data-src="${escapeAttr(r.artifactBase + "/trace.json")}"><summary>timing trace</summary><div class="trace-slot"><div class="trace-span-meta">loading…</div></div></details>`
            : "";
          return item + transcript + trace;
        })
        .join("");
      const sample = JSON.stringify(sampleResult, null, 2);
      return `
        <tr class="detail-row">
          <td class="detail-cell" colspan="8">
            <div class="detail">
              <div class="config-strip">${renderConfigChips(row)}</div>
              <div class="detail-kpis">
                <div class="detail-kpi"><span>Attempts</span><b>${row.runs}</b></div>
                <div class="detail-kpi"><span>Passed</span><b class="good">${row.passed}</b></div>
                <div class="detail-kpi"><span>Failed</span><b class="${row.failed ? "bad" : ""}">${row.failed}</b></div>
                <div class="detail-kpi"><span>Total Time</span><b>${formatDuration(totalDuration)}</b></div>
                <div class="detail-kpi"><span>Total Cost</span><b>${formatCost(row.estimatedCostUSD)}</b></div>
                <div class="detail-kpi"><span>Ran</span><b title="${escapeAttr(row.lastRunAt || '')}">${formatDateTime(row.lastRunAt)}</b></div>
              </div>
              <h3>Evaluation Attempts</h3>
              <div class="eval-list"><div class="eval-grid-head"><span>Status</span><span>Eval</span><span>Reason</span><span>Time</span><span>Tokens</span><span>Cost</span><span>Run</span></div>${details}</div>
              <details class="raw-details">
                <summary>Raw sample result <span class="raw-note">debug JSON, defaults to first failure when available</span></summary>
                <pre>${escapeHtml(sample)}</pre>
              </details>
            </div>
          </td>
        </tr>
      `;
    }

    function renderConfigChips(row) {
      const exp = row.experiment || {};
      const flags = exp.flags && Object.keys(exp.flags).length
        ? Object.entries(exp.flags).map(([k, v]) => k + "=" + formatConfigValue(v)).join(", ")
        : "none";
      const chips = [
        ["experiment", row.experimentId || row.label],
        ["model", row.model || "default"],
        ["agent", row.agent],
        ["runs", exp.runs ?? row.runs],
        ["earlyExit", exp.earlyExit === undefined ? "n/a" : String(exp.earlyExit)],
        ["sandbox", exp.sandbox || "default"],
        ["budget", exp.budget === undefined ? "none" : "$" + exp.budget],
        ["flags", flags],
      ];
      return chips.map(([label, value]) => `<span class="config-chip"><span>${escapeHtml(label)}</span><b>${escapeHtml(value)}</b></span>`).join("");
    }

    function renderTrace(spans) {
      if (!spans || !spans.length) return "";
      const t0 = Math.min(...spans.map((s) => s.startMs));
      const t1 = Math.max(...spans.map((s) => s.endMs));
      const total = Math.max(1, t1 - t0);
      const byId = new Map(spans.map((s) => [s.spanId, s]));
      const depthOf = (s) => {
        let d = 0, cur = s; const seen = new Set();
        while (cur && cur.parentSpanId && byId.has(cur.parentSpanId) && !seen.has(cur.spanId)) {
          seen.add(cur.spanId); cur = byId.get(cur.parentSpanId); d++;
          if (d > 40) break;
        }
        return d;
      };
      // 先按起点、再按深度排序,父在子前 —— 读起来像调用栈。
      const ordered = spans.slice().sort((a, b) => a.startMs - b.startMs || depthOf(a) - depthOf(b));
      const rows = ordered.map((s) => {
        const left = ((s.startMs - t0) / total) * 100;
        const width = Math.max(0.6, ((s.endMs - s.startMs) / total) * 100);
        // 着色按 canonical kind(跨 agent 同义同色),error 压过 kind。raw 名只进 label/tooltip。
        const kind = s.kind || "other";
        const tone = s.status === "error" ? "bad" : ("k-" + kind);
        const dur = formatDuration(s.endMs - s.startMs);
        const indent = depthOf(s) * 12;
        const detail = renderSpanAttrs(s.attributes);
        const chip = kind !== "other" ? `<span class="kind-chip k-${kind}">${kind}</span>` : "";
        const row = `<summary class="trace-row"><div class="trace-label" style="padding-left:${indent}px" title="${escapeAttr(s.name)}">${chip}${escapeHtml(s.name)}</div><div class="trace-track"><div class="trace-bar ${tone}" style="left:${left}%;width:${width}%"></div></div><div class="trace-dur num">${dur}</div></summary>`;
        // 有属性才做成可展开的 <details>;没有就一行(summary 单独也能渲染)。
        return detail
          ? `<details class="span-d">${row}${detail}</details>`
          : `<div class="span-d">${row}</div>`;
      }).join("");
      return `<div class="trace"><div class="trace-span-meta">total ${formatDuration(total)} · ${spans.length} spans · click a row for details</div>${rows}</div>`;
    }
    // 哪些属性是纯内部噪声、详情里不显示。
    const HIDE_ATTR = /^(code\.|thread\.|target$|busy_ns$|idle_ns$|rpc\.|app_server\.)/;
    function renderSpanAttrs(attrs) {
      if (!attrs) return "";
      const keys = Object.keys(attrs).filter((k) => !HIDE_ATTR.test(k));
      if (!keys.length) return "";
      // io.input / io.output 用代码块突出;其余按 key:value 列。
      const io = keys.filter((k) => k.startsWith("io."));
      const rest = keys.filter((k) => !k.startsWith("io.")).sort();
      const ioHtml = io.map((k) => {
        const label = k.replace(/^io\./, "");
        const v = attrs[k];
        const isBlock = label === "input" || label === "output";
        return isBlock
          ? `<div class="attr-io"><span class="attr-k">${escapeHtml(label)}</span><pre class="attr-pre">${escapeHtml(String(v))}</pre></div>`
          : `<div class="attr-row"><span class="attr-k">${escapeHtml(label)}</span><span class="attr-v">${escapeHtml(String(v))}</span></div>`;
      }).join("");
      const restHtml = rest.map((k) => {
        const v = attrs[k];
        const vs = typeof v === "object" ? JSON.stringify(v) : String(v);
        return `<div class="attr-row"><span class="attr-k">${escapeHtml(k)}</span><span class="attr-v">${escapeHtml(vs)}</span></div>`;
      }).join("");
      return `<div class="span-attrs">${ioHtml}${restHtml}</div>`;
    }
    // ── Claude-Code 风格 transcript:读 events.json,按事件顺序展示「LLM 说了什么 / 调了什么工具」。
    // 不画时间,只讲叙事:message / thinking / 工具调用(配对它的结果)/ 子 agent / 输入请求 / 错误。
    const TOOL_VERB = {
      file_read: "Read", file_write: "Write", file_edit: "Edit",
      shell: "Bash", web_fetch: "Fetch", web_search: "Search",
      glob: "Glob", grep: "Grep", list_dir: "List", agent_task: "Task",
    };
    function renderTranscript(events) {
      if (!Array.isArray(events) || !events.length) return '<div class="trace-span-meta">no events</div>';
      // 先把结果(action.result / subagent.completed)按 callId 建索引,渲染时和它的调用拼在一起。
      const resultByCall = new Map();
      for (const ev of events) {
        if (ev.type === "action.result" || ev.type === "subagent.completed") resultByCall.set(ev.callId, ev);
      }
      const pairedResult = new Set();
      const blocks = [];
      for (const ev of events) {
        switch (ev.type) {
          case "message": blocks.push(renderMessageBlock(ev)); break;
          case "thinking": blocks.push(renderThinkBlock(ev)); break;
          case "action.called": {
            const result = resultByCall.get(ev.callId);
            if (result) pairedResult.add(ev.callId);
            blocks.push(renderToolBlock(ev, result));
            break;
          }
          case "subagent.called": {
            const result = resultByCall.get(ev.callId);
            if (result) pairedResult.add(ev.callId);
            blocks.push(renderToolBlock({ tool: "agent_task", name: ev.name, input: { description: ev.name, ...(ev.remoteUrl ? { remoteUrl: ev.remoteUrl } : {}) } }, result));
            break;
          }
          case "action.result":
          case "subagent.completed":
            // 没配上调用的孤儿结果才单独渲染(正常都被上面 paired 了)。
            if (!pairedResult.has(ev.callId)) blocks.push(renderToolBlock({ tool: "unknown", name: "result", input: null }, ev));
            break;
          case "input.requested": blocks.push(renderInputBlock(ev)); break;
          case "compaction": blocks.push(`<div class="ts-compaction">context compacted${ev.reason ? " · " + escapeHtml(ev.reason) : ""}</div>`); break;
          case "error": blocks.push(`<div class="ts-error">⚠ ${escapeHtml(ev.message || "error")}</div>`); break;
          default: break;
        }
      }
      return `<div class="transcript">${blocks.join("")}</div>`;
    }
    function renderMessageBlock(ev) {
      const who = ev.role === "assistant" ? "assistant" : "user";
      return `<div class="ts-msg ts-${who}"><span class="ts-role">${who}</span><div class="ts-text">${escapeHtml(ev.text || "")}</div></div>`;
    }
    function renderThinkBlock(ev) {
      return `<details class="ts-think"><summary>thinking</summary><div class="ts-think-text">${escapeHtml(ev.text || "")}</div></details>`;
    }
    function renderInputBlock(ev) {
      const req = ev.request || {};
      const opts = (req.options || []).map((o) => o.label || o.id).filter(Boolean).join("  /  ");
      const body = (req.prompt || "(awaiting input)") + (opts ? "\n[ " + opts + " ]" : "");
      return `<div class="ts-msg ts-input"><span class="ts-role">input requested</span><div class="ts-text">${escapeHtml(body)}</div></div>`;
    }
    function renderToolBlock(call, result) {
      const verb = TOOL_VERB[call.tool] || call.name || call.tool || "tool";
      const arg = toolPrimaryArg(call);
      const label = arg ? `${verb}(${arg})` : verb;
      const status = result ? result.status : "pending";
      const dot = status === "failed" ? "bad" : status === "rejected" ? "warn" : status === "pending" ? "pending" : "good";
      const inputStr = call.input == null ? "" : prettyJson(call.input);
      const outBody = result ? resultBody(result.output) : "";
      const preview = result ? previewText(outBody) : "running…";
      return `<details class="ts-tool-d"><summary class="ts-row"><span class="ts-dot ${dot}"></span><span class="ts-tool" title="${escapeAttr(label)}">${escapeHtml(label)}</span><span class="ts-preview">${escapeHtml(truncate(preview, 140))}</span></summary><div class="ts-body">${
        inputStr ? `<div class="ts-field"><span class="ts-k">input</span><pre class="attr-pre">${escapeHtml(truncate(inputStr, 4000))}</pre></div>` : ""
      }${
        result ? `<div class="ts-field"><span class="ts-k">output${result.status && result.status !== "completed" ? " · " + escapeHtml(result.status) : ""}</span><pre class="attr-pre">${outBody ? escapeHtml(truncate(outBody, 8000)) : '<span class="reason-empty">(empty)</span>'}</pre></div>` : ""
      }</div></details>`;
    }
    function toolPrimaryArg(call) {
      const input = call.input;
      if (typeof input === "string") return input;
      if (!input || typeof input !== "object" || Array.isArray(input)) return "";
      if (call.tool === "shell") {
        const c = input.command ?? input.cmd;
        if (typeof c === "string") return c;
        if (Array.isArray(c)) return c.filter((x) => typeof x === "string").join(" ");
      }
      for (const k of ["path", "file", "file_path", "filename", "pattern", "query", "url", "uri", "prompt", "description", "command", "remoteUrl"]) {
        if (typeof input[k] === "string" && input[k]) return input[k];
      }
      return "";
    }
    // 工具结果常是 { output | stdout | content | text }:有文本字段就直接展示文本,否则美化 JSON。
    function resultBody(output) {
      if (output == null) return "";
      if (typeof output === "string") return output;
      if (typeof output === "object" && !Array.isArray(output)) {
        for (const k of ["output", "stdout", "content", "text", "result", "body"]) {
          if (typeof output[k] === "string") return output[k];
        }
      }
      return prettyJson(output);
    }
    function prettyJson(v) {
      if (typeof v === "string") return v;
      try { return JSON.stringify(v, null, 2); } catch { return String(v); }
    }
    function previewText(s) {
      const first = String(s).split("\n").find((l) => l.trim());
      return first || "";
    }
    function truncate(s, n) {
      s = String(s);
      return s.length > n ? s.slice(0, n) + " … [+" + (s.length - n) + " chars]" : s;
    }
    function formatConfigValue(value) {
      if (value === null) return "null";
      if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") return String(value);
      return JSON.stringify(value);
    }
    function totalTokens(usage) {
      return (usage?.inputTokens || 0) + (usage?.outputTokens || 0) + (usage?.cacheReadTokens || 0) + (usage?.cacheWriteTokens || 0);
    }
    function formatPercent(v) { return Math.round(v * 100) + "%"; }
    function formatDuration(ms) {
      if (!Number.isFinite(ms) || ms <= 0) return "0ms";
      if (ms >= 60000) return (ms / 60000).toFixed(1) + "m";
      if (ms >= 1000) return (ms / 1000).toFixed(2) + "s";
      return Math.round(ms) + "ms";
    }
    function formatTokens(n) {
      if (!Number.isFinite(n) || n <= 0) return "0";
      if (n >= 1000000) return (n / 1000000).toFixed(2) + "M";
      if (n >= 1000) return (n / 1000).toFixed(1) + "k";
      return String(Math.round(n));
    }
    function formatCost(n) {
      if (!Number.isFinite(n) || n <= 0) return "$0";
      return "$" + n.toFixed(n < 1 ? 3 : 2);
    }
    function formatDateTime(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "—";
      return d.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }
    function formatClock(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch]);
    }
    function escapeAttr(value) { return escapeHtml(value); }

    function updateSortIcons() {
      document.querySelectorAll("[data-sort]").forEach((btn) => {
        if (btn.dataset.sort === state.sort) btn.dataset.sorted = state.dir === 1 ? "asc" : "desc";
        else delete btn.dataset.sorted;
      });
    }

    document.addEventListener("click", (event) => {
      const sort = event.target.closest("[data-sort]");
      if (sort) {
        const key = sort.dataset.sort;
        if (state.sort === key) state.dir *= -1;
        else { state.sort = key; state.dir = key === "experiment" || key === "agent" ? 1 : -1; }
        render();
        updateSortIcons();
        return;
      }
      const groupCard = event.target.closest(".group-card");
      if (groupCard) {
        state.selectedGroup = groupCard.dataset.group;
        render();
        return;
      }
      const row = event.target.closest(".main-row");
      if (!row) return;
      const key = row.dataset.key;
      if (state.open.has(key)) state.open.delete(key);
      else state.open.add(key);
      render();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const row = event.target.closest(".main-row, .group-card");
      if (!row) return;
      event.preventDefault();
      row.click();
    });
    search?.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    // trace 懒加载:某条 trace <details> 第一次展开时 fetch 它的 trace.json 再渲染瀑布图。
    // 用 capture 监听 toggle(toggle 不冒泡),静态报告(无 server)fetch 失败给出提示。
    document.addEventListener("toggle", async (event) => {
      const d = event.target;
      if (!(d instanceof HTMLElement)) return;
      const isTranscript = d.classList.contains("transcript-lazy");
      if (!isTranscript && !d.classList.contains("trace-lazy")) return;
      if (!d.open || d.dataset.loaded) return;
      d.dataset.loaded = "1";
      const slot = d.querySelector(".trace-slot");
      try {
        const resp = await fetch("/artifact?p=" + encodeURIComponent(d.dataset.src));
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        slot.innerHTML = isTranscript ? renderTranscript(data) : renderTrace(data);
      } catch (e) {
        d.dataset.loaded = "";
        slot.innerHTML = '<div class="trace-span-meta">load failed (static report has no server — use <code>fasteval view</code>): ' + escapeHtml(String(e)) + '</div>';
      }
    }, true);

    render();
    updateSortIcons();

    // ── Tab switching ──────────────────────────────────────────────────────────
    const navTabs = document.querySelectorAll(".nav-tab");
    function switchTab(name) {
      navTabs.forEach((btn) => btn.classList.toggle("is-active", btn.dataset.tab === name));
      document.getElementById("tab-experiments").hidden = name !== "experiments";
      document.getElementById("tab-runs").hidden = name !== "runs";
      document.getElementById("tab-traces").hidden = name !== "traces";
      if (name === "runs") renderRunsView();
      if (name === "traces") renderTracesView();
    }
    navTabs.forEach((btn) => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

    // ── Runs view ──────────────────────────────────────────────────────────────
    const allRuns = rows.flatMap((row) =>
      row.results.map((r) => Object.assign({}, r, { rowLabel: row.label, rowAgent: row.agent, rowModel: row.model }))
    );
    let runsState = { query: "", rendered: false };
    function renderRunsView() {
      const container = document.getElementById("runs-container");
      if (!container) return;
      if (!runsState.rendered) {
        runsState.rendered = true;
        if (!allRuns.length) {
          container.innerHTML = '<div class="empty">No individual runs found.</div>';
          return;
        }
        const q = () => runsState.query.trim().toLowerCase();
        const buildTable = () => {
          const filtered = allRuns.filter((r) =>
            !q() || (r.id + " " + r.rowLabel + " " + r.rowAgent + " " + (r.rowModel || "")).toLowerCase().includes(q())
          );
          const trs = filtered.map((r) => {
            const tone = r.verdict === "passed" ? "good" : r.verdict === "failed" ? "bad" : "warn";
            return `<tr>
              <td><span class="name">${escapeHtml(r.id)}</span></td>
              <td>${escapeHtml(r.rowLabel)}</td>
              <td class="${tone}">${escapeHtml(r.verdict)}</td>
              <td>${escapeHtml(r.rowAgent)}</td>
              <td>${escapeHtml(r.rowModel || "default")}</td>
              <td class="num">${formatDuration(r.durationMs)}</td>
              <td class="num">${formatTokens(totalTokens(r.usage))}</td>
              <td class="num">${formatCost(r.estimatedCostUSD)}</td>
              <td class="num">${r.startedAt ? formatDateTime(r.startedAt) : "—"}</td>
            </tr>`;
          }).join("");
          return `<div class="table-wrap"><table>
            <thead><tr>
              <th>Eval ID</th><th>Experiment</th><th>Verdict</th><th>Agent</th><th>Model</th>
              <th>Duration</th><th>Tokens</th><th>Cost</th><th>Ran At</th>
            </tr></thead>
            <tbody>${trs || '<tr><td colspan="9" style="text-align:center;color:var(--muted)">No results match the filter.</td></tr>'}</tbody>
          </table></div>`;
        };
        container.innerHTML = buildTable();
        document.getElementById("runs-search")?.addEventListener("input", (e) => {
          runsState.query = e.target.value;
          container.innerHTML = buildTable();
        });
      }
    }

    // ── Traces view ────────────────────────────────────────────────────────────
    let tracesRendered = false;
    function renderTracesView() {
      if (tracesRendered) return;
      tracesRendered = true;
      const container = document.getElementById("traces-container");
      if (!container) return;
      const traceable = allRuns.filter((r) => r.hasEvents || r.hasTrace);
      if (!traceable.length) {
        container.innerHTML = '<div class="empty">No traces available. Traces are collected during eval runs when artifacts are saved.</div>';
        return;
      }
      container.innerHTML = traceable.map((r) => {
        const tone = r.verdict === "passed" ? "good" : r.verdict === "failed" ? "bad" : "warn";
        const transcript = (r.hasEvents && r.artifactBase)
          ? `<details class="trace-details transcript-lazy" data-src="${escapeAttr(r.artifactBase + "/events.json")}"><summary>transcript</summary><div class="trace-slot"><div class="trace-span-meta">loading…</div></div></details>`
          : "";
        const trace = (r.hasTrace && r.artifactBase)
          ? `<details class="trace-details trace-lazy" data-src="${escapeAttr(r.artifactBase + "/trace.json")}"><summary>timing trace</summary><div class="trace-slot"><div class="trace-span-meta">loading…</div></div></details>`
          : "";
        return `<div class="traces-entry">
          <div class="traces-entry-head">
            <span class="${tone} traces-verdict">${escapeHtml(r.verdict)}</span>
            <span class="eval-id">${escapeHtml(r.id)}</span>
            <span class="traces-exp">${escapeHtml(r.rowLabel)}</span>
            <span class="num traces-dur">${formatDuration(r.durationMs)}</span>
          </div>
          ${transcript}${trace}
        </div>`;
      }).join("");
    }
  </script>
</body>
</html>

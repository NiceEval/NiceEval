<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistant Web Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f3ea;
        color: #25211b;
      }
      body {
        margin: 0;
      }
      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 100vh;
      }
      header,
      form {
        border-bottom: 1px solid #d8d0c3;
        padding: 18px 20px;
        background: #fffaf1;
      }
      form {
        border-top: 1px solid #d8d0c3;
        border-bottom: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      p {
        margin: 6px 0 0;
        color: #756d60;
      }
      #messages {
        overflow: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        max-width: 760px;
        border: 1px solid #d8d0c3;
        border-radius: 8px;
        padding: 10px 12px;
        white-space: pre-wrap;
        background: white;
      }
      .user {
        align-self: flex-end;
        border-color: #356f67;
        background: #356f67;
        color: white;
      }
      input,
      button {
        min-height: 42px;
        border-radius: 7px;
        border: 1px solid #c9bda9;
        font: inherit;
      }
      input {
        padding: 0 12px;
      }
      button {
        padding: 0 16px;
        border-color: #25211b;
        background: #25211b;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Assistant Web Agent</h1>
        <p>一个最小 AI SDK tool-loop AI 助手（查天气 / 算数 / 搜索 / 看图），供 fasteval 的 ai-sdk example 评测。</p>
      </header>
      <section id="messages"></section>
      <form id="composer">
        <input id="input" autocomplete="off" value="北京今天天气怎么样？" />
        <button type="submit">发送</button>
      </form>
    </main>
    <script type="module">
      const messages = document.querySelector("#messages");
      const form = document.querySelector("#composer");
      const input = document.querySelector("#input");
      let sessionId;

      function append(text, role) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        messages.append(div);
        messages.scrollTop = messages.scrollHeight;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        input.value = "";
        append(message, "user");
        const response = await fetch("/api/turn", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ sessionId, message }),
        });
        const data = await response.json();
        sessionId = data.sessionId;
        append(data.reply ?? data.error ?? "无回复", "assistant");
      });
    </script>
  </body>
</html>

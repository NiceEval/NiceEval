<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #f7f3ea;
        color: #25211b;
      }
      body { margin: 0; }
      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        height: 100dvh;
      }

      /* header */
      header {
        padding: 14px 20px;
        background: #fffaf1;
        border-bottom: 1px solid #d8d0c3;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 { margin: 0; font-size: 17px; font-weight: 800; flex: 1; }

      /* model picker */
      #model-wrap { position: relative; }
      #model-btn {
        display: flex; align-items: center; gap: 6px;
        padding: 5px 10px; border: 1px solid #c9bda9; border-radius: 7px;
        background: white; font: inherit; font-size: 13px; font-weight: 600;
        cursor: pointer; white-space: nowrap;
      }
      #model-btn:hover { border-color: #356f67; }
      #model-btn .arrow { font-size: 10px; color: #756d60; transition: transform .15s; }
      #model-btn.open .arrow { transform: rotate(180deg); }
      #model-dropdown {
        display: none; position: absolute; right: 0; top: calc(100% + 4px);
        min-width: 220px; background: white; border: 1px solid #d8d0c3;
        border-radius: 9px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
        overflow: hidden; z-index: 10;
      }
      #model-dropdown.open { display: block; }
      .model-opt {
        padding: 9px 13px; cursor: pointer; border-bottom: 1px solid #f0ebe3;
        font-size: 13px;
      }
      .model-opt:last-child { border-bottom: 0; }
      .model-opt:hover { background: #f7f3ea; }
      .model-opt.active { background: #edf5f4; color: #356f67; }
      .model-opt .model-name { font-weight: 700; }
      .model-opt .model-meta { font-size: 11px; color: #756d60; margin-top: 2px; }

      /* messages */
      #messages {
        overflow: auto; padding: 20px;
        display: flex; flex-direction: column; gap: 10px;
      }
      .msg {
        max-width: 72%; border-radius: 10px;
        padding: 10px 13px; white-space: pre-wrap; line-height: 1.55;
        font-size: 14px;
      }
      .user { align-self: flex-end; background: #356f67; color: white; }
      .assistant { align-self: flex-start; background: white; border: 1px solid #d8d0c3; }
      .tool-bubble {
        align-self: flex-start; background: #f0ece4; border: 1px solid #d8d0c3;
        border-radius: 8px; padding: 6px 11px; font-size: 12px;
        font-family: ui-monospace, monospace; color: #5a5248; max-width: 72%;
      }
      .typing { color: #aaa; font-style: italic; }

      /* composer */
      form {
        display: grid; grid-template-columns: auto minmax(0,1fr) auto;
        gap: 10px; padding: 14px 20px;
        background: #fffaf1; border-top: 1px solid #d8d0c3;
      }
      #image-previews {
        display: flex; gap: 8px; flex-wrap: wrap;
        padding: 0 20px 8px; background: #fffaf1;
      }
      #image-previews:empty { display: none; }
      .preview-wrap {
        position: relative; width: 64px; height: 64px;
        border-radius: 7px; overflow: hidden; border: 1px solid #d8d0c3;
        flex-shrink: 0;
      }
      .preview-wrap img { width: 100%; height: 100%; object-fit: cover; }
      .preview-remove {
        position: absolute; top: 2px; right: 2px;
        width: 18px; height: 18px; border-radius: 50%;
        background: rgba(0,0,0,.55); color: white; border: none;
        font-size: 11px; line-height: 18px; text-align: center;
        cursor: pointer; padding: 0;
      }
      #upload-btn {
        min-height: 42px; width: 42px; border-radius: 7px;
        border: 1px solid #c9bda9; background: white;
        font-size: 18px; cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        color: #756d60; flex-shrink: 0;
      }
      #upload-btn:hover { border-color: #356f67; color: #356f67; }
      input[type=text] {
        padding: 0 12px; min-height: 42px; border-radius: 7px;
        border: 1px solid #c9bda9; font: inherit; font-size: 14px;
        background: white;
      }
      input[type=text]:focus { outline: none; border-color: #356f67; }
      button[type=submit] {
        min-height: 42px; padding: 0 18px; border-radius: 7px;
        border: none; background: #25211b; color: white;
        font: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
        flex-shrink: 0;
      }
      button[type=submit]:disabled { opacity: .45; cursor: default; }
      .msg-img {
        max-width: 240px; border-radius: 8px; display: block; margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>AI Assistant</h1>
        <div id="model-wrap">
          <button id="model-btn" type="button">
            <span id="model-label">加载中…</span>
            <span class="arrow">▾</span>
          </button>
          <div id="model-dropdown"></div>
        </div>
      </header>

      <section id="messages"></section>

      <div id="image-previews"></div>
      <form id="composer">
        <button id="upload-btn" type="button" title="上传图片">🖼</button>
        <input id="input" type="text" autocomplete="off" placeholder="发送消息…" />
        <button type="submit" id="send-btn">发送</button>
      </form>
      <input id="file-input" type="file" accept="image/*" multiple style="display:none" />
    </main>

    <script type="module">
      const messagesEl = document.querySelector("#messages");
      const form = document.querySelector("#composer");
      const input = document.querySelector("#input");
      const sendBtn = document.querySelector("#send-btn");
      const modelBtn = document.querySelector("#model-btn");
      const modelLabel = document.querySelector("#model-label");
      const modelDropdown = document.querySelector("#model-dropdown");
      const uploadBtn = document.querySelector("#upload-btn");
      const fileInput = document.querySelector("#file-input");
      const previewsEl = document.querySelector("#image-previews");

      let sessionId;
      let currentModel = "";
      let streaming = false;
      /** @type {{ file: File, dataBase64: string, mimeType: string, objectUrl: string }[]} */
      let pendingFiles = [];

      // ── 图片上传 ────────────────────────────────────────────────────────────
      uploadBtn.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", async () => {
        for (const file of fileInput.files) {
          const dataBase64 = await toBase64(file);
          const objectUrl = URL.createObjectURL(file);
          pendingFiles.push({ file, dataBase64, mimeType: file.type, objectUrl });
          addPreview(objectUrl, pendingFiles.length - 1);
        }
        fileInput.value = "";
      });

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function addPreview(objectUrl, index) {
        const wrap = document.createElement("div");
        wrap.className = "preview-wrap";
        wrap.dataset.index = index;
        const img = document.createElement("img");
        img.src = objectUrl;
        const rm = document.createElement("button");
        rm.className = "preview-remove";
        rm.textContent = "×";
        rm.addEventListener("click", () => removePreview(index));
        wrap.append(img, rm);
        previewsEl.appendChild(wrap);
      }

      function removePreview(index) {
        URL.revokeObjectURL(pendingFiles[index].objectUrl);
        pendingFiles.splice(index, 1);
        // 重建预览（index 变了）
        previewsEl.innerHTML = "";
        pendingFiles.forEach((f, i) => addPreview(f.objectUrl, i));
      }

      function clearPendingFiles() {
        pendingFiles.forEach(f => URL.revokeObjectURL(f.objectUrl));
        pendingFiles = [];
        previewsEl.innerHTML = "";
      }

      // ── 模型选择器 ──────────────────────────────────────────────────────────
      async function loadModels() {
        try {
          const res = await fetch("/api/models");
          const { models } = await res.json();
          currentModel = models[0]?.id ?? "gpt-4o-mini";
          modelLabel.textContent = models[0]?.label ?? currentModel;

          modelDropdown.innerHTML = "";
          for (const m of models) {
            const div = document.createElement("div");
            div.className = `model-opt${m.id === currentModel ? " active" : ""}`;
            div.dataset.id = m.id;
            const ctx = m.contextTokens >= 1000 ? `${Math.round(m.contextTokens / 1000)}K ctx` : "";
            div.innerHTML = `<div class="model-name">${m.label}</div>${ctx ? `<div class="model-meta">${ctx}</div>` : ""}`;
            div.addEventListener("click", () => selectModel(m.id, m.label, models));
            modelDropdown.appendChild(div);
          }
        } catch {
          modelLabel.textContent = "gpt-4o-mini";
          currentModel = "gpt-4o-mini";
        }
      }

      function selectModel(id, label, models) {
        currentModel = id;
        modelLabel.textContent = label;
        modelDropdown.querySelectorAll(".model-opt").forEach((el) => {
          el.classList.toggle("active", el.dataset.id === id);
        });
        closeDropdown();
      }

      function closeDropdown() {
        modelDropdown.classList.remove("open");
        modelBtn.classList.remove("open");
      }

      modelBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = modelDropdown.classList.toggle("open");
        modelBtn.classList.toggle("open", isOpen);
      });
      document.addEventListener("click", closeDropdown);
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDropdown(); });

      // ── 消息渲染 ────────────────────────────────────────────────────────────
      function appendMsg(text, role, imageUrls) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.textContent = text;
        if (imageUrls?.length) {
          for (const url of imageUrls) {
            const img = document.createElement("img");
            img.src = url; img.className = "msg-img";
            div.appendChild(img);
          }
        }
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function appendToolBubble(name, input) {
        const div = document.createElement("div");
        div.className = "tool-bubble";
        div.textContent = `⚙ ${name}(${JSON.stringify(input)})`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      // ── 发送 ────────────────────────────────────────────────────────────────
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if ((!message && pendingFiles.length === 0) || streaming) return;

        input.value = "";
        streaming = true;
        sendBtn.disabled = true;

        const files = pendingFiles.map(f => ({ mimeType: f.mimeType, dataBase64: f.dataBase64 }));
        const previewUrls = pendingFiles.map(f => f.objectUrl);
        clearPendingFiles();

        appendMsg(message || "（图片）", "user", previewUrls);
        const bubble = appendMsg("", "assistant typing");
        const toolBubbles = new Map();

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ sessionId, message, model: currentModel, files: files.length ? files : undefined }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split("\n\n");
            buf = lines.pop() ?? "";

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const msg = JSON.parse(line.slice(6));

              if (msg.delta !== undefined) {
                bubble.classList.remove("typing");
                bubble.textContent += msg.delta;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              } else if (msg.event) {
                const ev = msg.event;
                if (ev.type === "action.called") {
                  const tb = appendToolBubble(ev.name, ev.input);
                  toolBubbles.set(ev.callId, tb);
                } else if (ev.type === "action.result") {
                  const tb = toolBubbles.get(ev.callId);
                  if (tb) tb.textContent += ` → ${JSON.stringify(ev.output)}`;
                }
              } else if (msg.done) {
                sessionId = msg.response.sessionId;
                if (!bubble.textContent) bubble.textContent = "（无回复）";
                bubble.classList.remove("typing");
              } else if (msg.error) {
                bubble.textContent = `错误：${msg.error}`;
                bubble.classList.remove("typing");
              }
            }
          }
        } catch (err) {
          bubble.textContent = `错误：${err.message}`;
          bubble.classList.remove("typing");
        } finally {
          streaming = false;
          sendBtn.disabled = false;
          input.focus();
        }
      });

      loadModels();
      input.focus();
    </script>
  </body>
</html>

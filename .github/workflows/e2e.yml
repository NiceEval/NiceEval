name: e2e

# 独立测试仓库矩阵的 CI 编排(docs/engineering/e2e-ci/README.md §6.1)。
#
# 设计原则:本 workflow 不重新实现根编排逻辑——`discover` job 只做「发现 + 按触发层级
# 过滤」,真正的每仓库执行永远是同一条命令 `pnpm e2e --repo <id>`(§5),与开发者本机、
# crabbox 完全一致。matrix 由 `e2e/scripts/list.ts --json` 动态生成,不写死仓库列表;
# runner 规格、python 环境、需要哪些 secrets、上传哪些 artifact 全部读自每个仓库自己的
# `e2e.json`,中央 workflow 不内置任何仓库专属知识(README §5「编排器不得」)。
#
# 触发层级(README §6.1):
#   1. PR 门禁    — pull_request + push(main):sdk + contract 组,仓库自己 Experiment
#                    声明的便宜档位。
#   2. 路径门禁   — sandbox 组(Docker 仓库),仅当改动触及沙箱相关路径时随 1 一起跑。
#   3. Nightly    — 全量矩阵(全部 group),schedule + workflow_dispatch(可选 --repo/--group)。
#
# fork PR 说明:`pull_request` 事件下,来自 fork 的 PR 按 GitHub 的安全模型拿不到本仓库
# secrets;各测试仓库自己的 fail-fast secret 检查会让这类运行直接判红(退出 1)。这是
# GitHub 平台边界,不在本 workflow 解决——同代码库直接在 main 上开发的场景下影响有限。

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # 03:17 UTC——避开整点堆积的 GitHub Actions 高峰;具体时间点没有强约束,人工可按需调整。
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "只跑这一个仓库 id(留空则按 group 选择;覆盖下面的 group 输入)"
        required: false
        type: string
      group:
        description: "留空 repo 时按此 group 选择;all = 全量矩阵"
        required: false
        type: choice
        options:
          - all
          - sdk
          - sandbox
          - contract
        default: all

permissions:
  contents: read

jobs:
  # 发现 e2e/repos/*/e2e.json,按本次触发层级过滤成最终 matrix。
  # 不读取、不解释任何仓库的 .niceeval/、Eval 或 Experiment 内容(README §5 编排边界)。
  discover:
    name: discover e2e matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: e2e-discover-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has-jobs: ${{ steps.matrix.outputs.has-jobs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 路径门禁判定需要和 base commit 做 diff,浅克隆下不一定有那个提交

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (for tsx)
        run: pnpm install --frozen-lockfile

      # 只在 stdout 打印紧凑 JSON 数组——list.ts --json 的契约就是「stdout 只有 JSON,
      # 别的都走 stderr」,下面用文件重定向而不是命令替换,方便解析失败时直接查文件内容。
      - name: Run list.ts --json
        run: npx tsx e2e/scripts/list.ts --json > "$RUNNER_TEMP/e2e-repos.json"

      # push/pull_request 下判断本次改动是否触及 sandbox 组关心的路径:该组仓库自己的
      # 目录(从上一步 list.ts --json 的输出里动态取 group=="sandbox" 的 id,不写死
      # 仓库名——中央 workflow 不内置仓库专属知识这条原则同样适用于路径门禁)、niceeval
      # 里被这些仓库依赖的 Agent/Sandbox 源码,以及编排脚本自身。判不出来一律当命中
      # (fail-open)——宁可多跑一次沙箱矩阵,不静默漏掉验证。
      - name: Detect sandbox-relevant path changes
        id: sandbox-paths
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "base commit unavailable (new branch, force-push, or shallow history) — defaulting to hit=true"
            echo "hit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "changed files:"
          echo "$changed"

          sandbox_ids=$(jq -r '[.[] | select(.group == "sandbox") | .id] | join("|")' "$RUNNER_TEMP/e2e-repos.json")
          pattern='^(src/agents/|src/sandbox/|e2e/scripts/|\.github/workflows/e2e\.yml)'
          if [ -n "$sandbox_ids" ]; then
            pattern="^(e2e/repos/($sandbox_ids)/|src/agents/|src/sandbox/|e2e/scripts/|\\.github/workflows/e2e\\.yml)"
          fi

          if echo "$changed" | grep -qE "$pattern"; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      # 按事件类型选出本次要跑的仓库子集,写成紧凑 JSON 供下游 matrix 用 fromJson(...) 消费。
      - name: Build matrix for this trigger tier
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SANDBOX_HIT: ${{ steps.sandbox-paths.outputs.hit }}
          DISPATCH_REPO: ${{ github.event.inputs.repo }}
          DISPATCH_GROUP: ${{ github.event.inputs.group }}
          REPOS_JSON_PATH: ${{ runner.temp }}/e2e-repos.json
        run: |
          node <<'NODE_EOF'
          const fs = require("fs");

          const repos = JSON.parse(fs.readFileSync(process.env.REPOS_JSON_PATH, "utf8"));
          const event = process.env.EVENT_NAME;
          const sandboxHit = process.env.SANDBOX_HIT === "true";
          const dispatchRepo = (process.env.DISPATCH_REPO || "").trim();
          const dispatchGroup = (process.env.DISPATCH_GROUP || "all").trim();

          let selected;
          if (event === "workflow_dispatch" && dispatchRepo) {
            selected = repos.filter((r) => r.id === dispatchRepo);
          } else if (event === "workflow_dispatch") {
            selected = dispatchGroup === "all" ? repos : repos.filter((r) => r.group === dispatchGroup);
          } else if (event === "schedule") {
            selected = repos; // nightly: full matrix, all groups
          } else {
            // pull_request / push(main): sdk + contract always, sandbox only on path hit
            selected = repos.filter((r) => r.group === "sdk" || r.group === "contract" || (r.group === "sandbox" && sandboxHit));
          }

          const matrixLine = `matrix=${JSON.stringify(selected)}\n`;
          const hasJobsLine = `has-jobs=${selected.length > 0 ? "true" : "false"}\n`;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, matrixLine + hasJobsLine);

          console.log(`[e2e] event=${event} selected ${selected.length} repo(s): ${selected.map((r) => r.id).join(", ") || "(none)"}`);
          NODE_EOF

  # 每个 matrix cell 只运行一个测试仓库(README §6.1)。真正的执行永远只有一条命令:
  # `pnpm e2e --repo <id>`——本 job 不重新实现候选包注入、secrets 过滤或退出码分类,
  # 那些都是 e2e/scripts/run.ts 的职责,本地、CI、crabbox 共用同一条命令。
  e2e:
    name: e2e (${{ matrix.repo.id }})
    needs: discover
    if: needs.discover.outputs.has-jobs == 'true'
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    # 当前矩阵里的 requires 只出现 docker 与 runtimes(node/python),没有仓库要求
    # arch 或 memoryGB 超出标准 runner——ubuntu-latest 自带 Docker,统一用它比为空
    # 需求发明 runner 标签更简单(README §6.1 + requires 字段核对,见任务报告)。
    timeout-minutes: 150
    concurrency:
      # sandbox 组单仓库可能跑 20-40 分钟(且内部对 75 退出码重跑一次),被连续 push
      # 顶掉就永远验证不完;sdk/contract 组便宜,新 push 顶掉旧的没问题。按仓库 id
      # 分组是因为同一仓库不该并发跑两份,不同仓库之间本就没有互斥必要。
      group: e2e-${{ matrix.repo.id }}-${{ github.ref }}
      cancel-in-progress: ${{ matrix.repo.group != 'sandbox' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 只有 requires.runtimes 声明了 python 的仓库才需要——用 toJson 兜底 requires
      # 整体缺省的情况(undefined 序列化成 "null",contains 自然是 false)。
      - name: Set up Python
        if: contains(toJSON(matrix.repo.requires), 'python')
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 根仓库自己的依赖(tsx、run.ts 需要的一切)——每个测试仓库自己的依赖由
      # `pnpm e2e --repo <id>` 内部在隔离拷贝里装,这里不代劳。
      - name: Install orchestrator dependencies
        run: pnpm install --frozen-lockfile

      # 读这个仓库自己的 e2e.json,只取本 job 需要的三件事:声明的 secret 名(用于
      # 下一步最小化过滤注入)、artifact glob(用于上传前定位文件)、以及供
      # actions/upload-artifact 直接消费的仓库前缀路径列表。不重复 run.ts 的
      # discoverRepos/schema 校验——那条校验已经在 discover job 的 list.ts 里跑过。
      - name: Read repo manifest
        id: manifest
        env:
          REPO_ID: ${{ matrix.repo.id }}
        run: |
          manifest="e2e/repos/$REPO_ID/e2e.json"
          echo "secrets=$(jq -c '.secrets' "$manifest")" >> "$GITHUB_OUTPUT"
          echo "artifacts=$(jq -c '.artifacts' "$manifest")" >> "$GITHUB_OUTPUT"
          {
            echo "artifact-paths<<E2E_ARTIFACT_PATHS_EOF"
            jq -r --arg dir "e2e/repos/$REPO_ID" '.artifacts[] | "\($dir)/\(.)"' "$manifest"
            echo "E2E_ARTIFACT_PATHS_EOF"
          } >> "$GITHUB_OUTPUT"

      # 标准安全模式(README §6.1 第 3 点):把全部 secrets 塞进这一步自己的 env 作为
      # 一个 JSON blob,再按 e2e.json.secrets 过滤成这个仓库自己声明的最小子集,写进
      # $GITHUB_ENV 供本 job 后续步骤使用——本 job 只运行一个仓库,所以「注入到本
      # job 的环境」和「注入到这个仓库」是一回事,不会有其它仓库的 secret 混进来。
      # 用 <<marker 形式写 GITHUB_ENV 是为了不对 secret 值本身的换行/特殊字符做任何
      # 假设;不手动 echo 或 ::add-mask:: 任何值——那样反而会先把值打进日志。
      - name: Inject this repo's declared secrets only
        env:
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
          SECRET_NAMES_JSON: ${{ steps.manifest.outputs.secrets }}
        run: |
          node <<'NODE_EOF'
          const fs = require("fs");

          const all = JSON.parse(process.env.ALL_SECRETS_JSON);
          const names = JSON.parse(process.env.SECRET_NAMES_JSON);

          const lines = [];
          let injected = 0;
          for (const name of names) {
            const value = all[name];
            if (typeof value !== "string" || value.length === 0) continue;
            const marker = `E2E_SECRET_${name}_${Math.random().toString(36).slice(2)}`;
            lines.push(`${name}<<${marker}`, value, marker);
            injected++;
          }
          if (lines.length > 0) {
            fs.appendFileSync(process.env.GITHUB_ENV, lines.join("\n") + "\n");
          }
          console.log(`[e2e] injected ${injected} of ${names.length} declared secret(s) for this repo`);
          NODE_EOF

      # CI 不重新实现编排逻辑——本地、CI、crabbox 三处永远是这一条命令(README §6.1/§6.2)。
      - name: Run e2e for ${{ matrix.repo.id }}
        run: pnpm e2e --repo ${{ matrix.repo.id }}

      # 无论成败都收集(README §6.1):对声明的 artifact glob 命中的每个文件,把本次
      # 注入的 secret 值原地替换成 <redacted:VAR_NAME> 再上传——真实 Agent/服务日志可能
      # 回显环境变量,脱敏由这一层兜底,不指望每个仓库的日志纪律。
      #
      # run.ts 在隔离拷贝里跑完命令后(无论成败)把声明的 artifacts 拷回这里的
      # e2e/repos/<id>/,再删 scratch 目录——下面两步读到的就是这份拷回的证据。
      - name: Redact secret values from collected artifacts
        if: always()
        env:
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
          SECRET_NAMES_JSON: ${{ steps.manifest.outputs.secrets }}
          ARTIFACTS_JSON: ${{ steps.manifest.outputs.artifacts }}
          REPO_DIR: e2e/repos/${{ matrix.repo.id }}
        run: |
          shopt -s globstar dotglob nullglob
          mapfile -t patterns < <(node -e 'process.stdout.write(JSON.parse(process.env.ARTIFACTS_JSON).join("\n"))')

          matched="$RUNNER_TEMP/e2e-artifact-files.txt"
          : > "$matched"
          if [ -d "$REPO_DIR" ]; then
            pushd "$REPO_DIR" > /dev/null
            for p in "${patterns[@]}"; do
              for f in $p; do
                [ -f "$f" ] && echo "$f" >> "$matched"
              done
            done
            popd > /dev/null
          fi

          count=$(wc -l < "$matched" | tr -d ' ')
          echo "[e2e] $count artifact file(s) matched declared globs"
          if [ "$count" -eq 0 ]; then
            echo "[e2e] nothing to redact"
            exit 0
          fi

          MATCHED_FILE="$matched" node <<'NODE_EOF'
          const fs = require("fs");
          const path = require("path");

          const repoDir = process.env.REPO_DIR;
          const files = fs.readFileSync(process.env.MATCHED_FILE, "utf8").split("\n").filter(Boolean);
          const names = JSON.parse(process.env.SECRET_NAMES_JSON);
          const all = JSON.parse(process.env.ALL_SECRETS_JSON);
          const replacements = names
            .map((name) => ({ name, value: all[name] }))
            .filter(({ value }) => typeof value === "string" && value.length > 0);

          let hits = 0;
          for (const rel of files) {
            const abs = path.join(repoDir, rel);
            let text;
            try {
              text = fs.readFileSync(abs, "utf8");
            } catch {
              continue; // not UTF-8 text (or vanished mid-scan) — leave as-is, still uploaded
            }
            let next = text;
            for (const { name, value } of replacements) {
              if (next.includes(value)) {
                hits += next.split(value).length - 1;
                next = next.split(value).join(`<redacted:${name}>`);
              }
            }
            if (next !== text) fs.writeFileSync(abs, next, "utf8");
          }
          console.log(`[e2e] redaction scan: ${hits} secret-value occurrence(s) replaced across ${files.length} file(s)`);
          NODE_EOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.repo.id }}
          path: ${{ steps.manifest.outputs.artifact-paths }}
          retention-days: 14
          if-no-files-found: warn
          include-hidden-files: true

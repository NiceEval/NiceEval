name: e2e

# L0 PR 门禁(docs/engineering/e2e-ci/README.md 第 4、7 节):真实模型、便宜档位、runs: 3 + earlyExit。
# 成败判据 = e2e/scripts/verify.mjs 的期望表(退出码 + summary.json 对账)。
# fork PR 拿不到 secrets 是 GitHub 的安全模型,不在本 workflow 解决(提案第 9 节)。
#
# 暂停自动触发(2026-07-13,见 memory/e2e-verify-results-format-drift.md):e2e 正在重构,
# verify.mjs 还按 results schemaVersion 4 之前的 summary.json 布局校验,和当前 snapshot.json
# 布局对不上,每次 push 必红。重构落地前只保留 workflow_dispatch 手动触发,不拿这个已知会红
# 的检查挡 push/PR/nightly。重构完成后把 push / pull_request / schedule 三个触发器加回来。
on:
  workflow_dispatch:

# concurrency 放 job 级而不是 workflow 级:SDK 矩阵便宜,新 push 顶掉旧的没问题;
# 沙箱矩阵单次 20-40 分钟,若被后续 push 连环取消就永远验证不完(2026-07-09 实测
# 连续两次被 docs push 顶掉),所以它 cancel-in-progress: false,在跑的跑完再排新的。

jobs:
  # push 事件下判断本次改动是否触及沙箱矩阵关心的路径(docker 沙箱后端、内置
  # agent adapter、沙箱 e2e 项目、共享套件、本 workflow)。判不出来一律当命中
  # (fail-open):宁可多跑一次矩阵,不静默漏掉验证。
  detect-sandbox-paths:
    name: detect sandbox-relevant changes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      hit: ${{ steps.diff.outputs.hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff changed paths against sandbox triggers
        id: diff
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "base commit unavailable (new branch or force push), defaulting to hit=true"
            echo "hit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BEFORE" "$AFTER")
          echo "changed files:"
          echo "$changed"
          if echo "$changed" | grep -qE '^(src/sandbox/|src/agents/|e2e/projects/(claude-code|codex)/|e2e/shared/|e2e/scripts/|\.github/workflows/e2e\.yml)'; then
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-matrix:
    name: e2e matrix (5 SDK projects)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: e2e-matrix-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: e2e/apps/langgraph/requirements.txt

      - name: Install repo dependencies (CLI runtime)
        run: pnpm install --frozen-lockfile

      - name: Install e2e suite dependencies
        run: |
          pnpm install --dir e2e --frozen-lockfile
          for d in ai-sdk-v7 claude-sdk codex-sdk pi-sdk; do
            pnpm install --dir e2e/apps/$d --frozen-lockfile
          done
          python3 -m venv e2e/apps/langgraph/.venv
          e2e/apps/langgraph/.venv/bin/pip install -q -r e2e/apps/langgraph/requirements.txt

      # 凭据映射见 memory/origin-examples-real-ai-credentials.md:同一把 DeepSeek key
      # 按协议分饰 Anthropic 兼容(/anthropic)与 OpenAI 兼容(无后缀)两个 base URL;
      # s2a 代理 key 供 codex 与 judge(gpt-5.4)。base URL 不是秘密,直接写死。
      - name: Write .env files from secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          NICEEVAL_JUDGE_KEY: ${{ secrets.NICEEVAL_JUDGE_KEY }}
        run: |
          cat > e2e/apps/ai-sdk-v7/.env <<EOF
          OPENAI_API_KEY=$CODEX_API_KEY
          OPENAI_BASE_URL=https://s2a.jihuayu.site/v1
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          EOF
          cat > e2e/apps/claude-sdk/.env <<EOF
          ANTHROPIC_API_KEY=$DEEPSEEK_API_KEY
          ANTHROPIC_BASE_URL=https://api.deepseek.com/anthropic
          AGENT_MODEL=deepseek-v4-flash
          EOF
          cat > e2e/apps/codex-sdk/.env <<EOF
          CODEX_API_KEY=$CODEX_API_KEY
          CODEX_BASE_URL=https://s2a.jihuayu.site/v1
          AGENT_MODEL=gpt-5.4
          CODEX_SANDBOX_MODE=danger-full-access
          EOF
          cat > e2e/apps/langgraph/.env <<EOF
          OPENAI_API_KEY=$DEEPSEEK_API_KEY
          OPENAI_BASE_URL=https://api.deepseek.com
          AGENT_MODEL=deepseek-v4-flash
          EOF
          cat > e2e/apps/pi-sdk/.env <<EOF
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          AGENT_MODEL=deepseek-v4-flash
          EOF
          for p in ai-sdk-v7 claude-sdk codex-sdk langgraph pi-sdk; do
            cat > e2e/projects/$p/.env <<EOF
          NICEEVAL_JUDGE_KEY=$NICEEVAL_JUDGE_KEY
          NICEEVAL_JUDGE_BASE=https://s2a.jihuayu.site/v1
          EOF
          done

      # 起应用的是 CI workflow(扮演用户),不是 eval 框架——不违反"eval 不代管进程"。
      - name: Start apps
        run: |
          mkdir -p "$RUNNER_TEMP/e2e-logs"
          (cd e2e/apps/ai-sdk-v7 && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/ai-sdk-v7.log" 2>&1 &)
          (cd e2e/apps/claude-sdk && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/claude-sdk.log" 2>&1 &)
          (cd e2e/apps/codex-sdk && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/codex-sdk.log" 2>&1 &)
          (cd e2e/apps/pi-sdk && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/pi-sdk.log" 2>&1 &)
          (cd e2e/apps/langgraph && nohup .venv/bin/python src/backend/server.py > "$RUNNER_TEMP/e2e-logs/langgraph.log" 2>&1 &)
          for port in 34001 32001 31001 33001 35000; do
            for i in $(seq 1 60); do
              nc -z 127.0.0.1 $port && break
              [ "$i" = 60 ] && { echo "port $port never came up"; cat "$RUNNER_TEMP"/e2e-logs/*.log; exit 1; }
              sleep 1
            done
            echo "port $port up"
          done

      # 只跑 SDK 组(HTTP 被测应用那 5 个项目);沙箱矩阵在下面的 e2e-sandbox job。
      - name: Verify (exit codes + summary.json 对账)
        run: node e2e/scripts/verify.mjs sdk

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            e2e/projects/*/.niceeval
            ${{ runner.temp }}/e2e-logs
          retention-days: 14
          if-no-files-found: ignore
          # .niceeval 是隐藏目录,v4 默认排除隐藏文件,不开这个只会传出 app 日志
          include-hidden-files: true

  # L1 沙箱矩阵(docs/engineering/e2e-ci/README.md §4.2):claude-code / codex 内置 agent × dockerSandbox。
  # 每个 attempt 在容器里现装 agent CLI + 真实模型调用,又慢又花钱,所以不做
  # 全量 push 门禁;nightly + 手动 dispatch 之外,只有 push 触及沙箱相关路径
  # (见 detect-sandbox-paths)才跑。失败是健康信号,不阻塞合并。
  # if 里的 !cancelled() 是为了让 schedule/dispatch 事件下 detect 被 skip 时
  # 本 job 不被连坐 skip(GitHub 默认 needs 里有 skip 则全 skip)。
  e2e-sandbox:
    name: e2e sandbox matrix (claude-code / codex × docker)
    needs: detect-sandbox-paths
    if: >-
      !cancelled() && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && needs.detect-sandbox-paths.outputs.hit == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: e2e-sandbox-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install repo dependencies (CLI runtime)
        run: pnpm install --frozen-lockfile

      - name: Install e2e suite dependencies
        run: pnpm install --dir e2e --frozen-lockfile

      # 凭据映射同 e2e-matrix:DeepSeek key 走 Anthropic 兼容端点喂 claude CLI,
      # s2a 代理 key 喂 codex CLI 与 judge。变量集与各项目 .env.example 一致。
      - name: Write .env files from secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          NICEEVAL_JUDGE_KEY: ${{ secrets.NICEEVAL_JUDGE_KEY }}
        run: |
          cat > e2e/projects/claude-code/.env <<EOF
          ANTHROPIC_API_KEY=$DEEPSEEK_API_KEY
          ANTHROPIC_BASE_URL=https://api.deepseek.com/anthropic
          NICEEVAL_JUDGE_KEY=$NICEEVAL_JUDGE_KEY
          NICEEVAL_JUDGE_BASE=https://s2a.jihuayu.site/v1
          EOF
          cat > e2e/projects/codex/.env <<EOF
          CODEX_API_KEY=$CODEX_API_KEY
          CODEX_BASE_URL=https://s2a.jihuayu.site/v1
          NICEEVAL_JUDGE_KEY=$NICEEVAL_JUDGE_KEY
          NICEEVAL_JUDGE_BASE=https://s2a.jihuayu.site/v1
          EOF

      - name: Verify sandbox matrix
        run: node e2e/scripts/verify.mjs sandbox

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-sandbox-artifacts
          path: e2e/projects/*/.niceeval
          retention-days: 14
          if-no-files-found: ignore
          include-hidden-files: true

      # nightly 失败发 issue(docs/engineering/e2e-ci/README.md §4.2 的"失败发通知"),否则标红没人看
      # 等于没跑。已有同名 open issue 就追评,避免连败刷屏。push 触发的失败不发:
      # 那种红本身就在 commit 状态里可见。
      - name: File issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="e2e nightly sandbox matrix failed"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "\"$title\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Failed again: $RUN_URL"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
              --body "Nightly sandbox matrix run failed: $RUN_URL"
          fi

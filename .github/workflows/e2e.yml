name: e2e

# L0 PR 门禁(docs/e2e-ci.md 第 4、7 节):真实模型、便宜档位、runs: 3 + earlyExit。
# 成败判据 = e2e/scripts/verify.mjs 的期望表(退出码 + summary.json 对账)。
# fork PR 拿不到 secrets 是 GitHub 的安全模型,不在本 workflow 解决(提案第 9 节)。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-matrix:
    name: e2e matrix (5 SDK projects)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: e2e/apps/langgraph/requirements.txt

      - name: Install repo dependencies (CLI runtime)
        run: pnpm install --frozen-lockfile

      - name: Install e2e suite dependencies
        run: |
          pnpm install --dir e2e --frozen-lockfile
          for d in ai-sdk-v7 claude-sdk codex-sdk pi-sdk; do
            pnpm install --dir e2e/apps/$d --frozen-lockfile
          done
          python3 -m venv e2e/apps/langgraph/.venv
          e2e/apps/langgraph/.venv/bin/pip install -q -r e2e/apps/langgraph/requirements.txt

      # 凭据映射见 memory/origin-examples-real-ai-credentials.md:同一把 DeepSeek key
      # 按协议分饰 Anthropic 兼容(/anthropic)与 OpenAI 兼容(无后缀)两个 base URL;
      # s2a 代理 key 供 codex 与 judge(gpt-5.4)。base URL 不是秘密,直接写死。
      - name: Write .env files from secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          NICEEVAL_JUDGE_KEY: ${{ secrets.NICEEVAL_JUDGE_KEY }}
        run: |
          cat > e2e/apps/ai-sdk-v7/.env <<EOF
          OPENAI_API_KEY=$CODEX_API_KEY
          OPENAI_BASE_URL=https://s2a.jihuayu.site/v1
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          EOF
          cat > e2e/apps/claude-sdk/.env <<EOF
          ANTHROPIC_API_KEY=$DEEPSEEK_API_KEY
          ANTHROPIC_BASE_URL=https://api.deepseek.com/anthropic
          AGENT_MODEL=deepseek-v4-flash
          EOF
          cat > e2e/apps/codex-sdk/.env <<EOF
          CODEX_API_KEY=$CODEX_API_KEY
          CODEX_BASE_URL=https://s2a.jihuayu.site/v1
          AGENT_MODEL=gpt-5.4
          EOF
          cat > e2e/apps/langgraph/.env <<EOF
          OPENAI_API_KEY=$DEEPSEEK_API_KEY
          OPENAI_BASE_URL=https://api.deepseek.com
          AGENT_MODEL=deepseek-v4-flash
          EOF
          cat > e2e/apps/pi-sdk/.env <<EOF
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          AGENT_MODEL=deepseek-v4-flash
          EOF
          for p in ai-sdk-v7 claude-sdk codex-sdk langgraph pi-sdk; do
            cat > e2e/projects/$p/.env <<EOF
          NICEEVAL_JUDGE_KEY=$NICEEVAL_JUDGE_KEY
          NICEEVAL_JUDGE_BASE=https://s2a.jihuayu.site/v1
          EOF
          done

      # 起应用的是 CI workflow(扮演用户),不是 eval 框架——不违反"eval 不代管进程"。
      - name: Start apps
        run: |
          mkdir -p "$RUNNER_TEMP/e2e-logs"
          (cd e2e/apps/ai-sdk-v7 && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/ai-sdk-v7.log" 2>&1 &)
          (cd e2e/apps/claude-sdk && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/claude-sdk.log" 2>&1 &)
          (cd e2e/apps/codex-sdk && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/codex-sdk.log" 2>&1 &)
          (cd e2e/apps/pi-sdk && nohup pnpm start > "$RUNNER_TEMP/e2e-logs/pi-sdk.log" 2>&1 &)
          (cd e2e/apps/langgraph && nohup .venv/bin/python src/backend/server.py > "$RUNNER_TEMP/e2e-logs/langgraph.log" 2>&1 &)
          for port in 34001 32001 31001 33001 35000; do
            for i in $(seq 1 60); do
              nc -z 127.0.0.1 $port && break
              [ "$i" = 60 ] && { echo "port $port never came up"; cat "$RUNNER_TEMP"/e2e-logs/*.log; exit 1; }
              sleep 1
            done
            echo "port $port up"
          done

      - name: Verify (exit codes + summary.json 对账)
        run: node e2e/scripts/verify.mjs

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            e2e/projects/*/.niceeval
            ${{ runner.temp }}/e2e-logs
          retention-days: 14
          if-no-files-found: ignore
          # .niceeval 是隐藏目录,v4 默认排除隐藏文件,不开这个只会传出 app 日志
          include-hidden-files: true
